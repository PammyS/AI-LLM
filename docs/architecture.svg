  <text font-size="12" x="340" y="322" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Retry · circuit breaker · timeout · fallback</text>

  <!-- Arrow 4 -->
  <line x1="340" y1="336" x2="340" y2="372" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

