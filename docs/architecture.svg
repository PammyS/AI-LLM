  <rect x="190" y="372" width="300" height="52" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="392" text-anchor="middle" dominant-baseline="central" fill="#04342C">LangChain4j @AiService</text>
  <text font-size="12" x="340" y="410" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Structured output · async · DTO-driven</text>

  <!-- Arrow 5 -->
  <line x1="340" y1="424" x2="340" y2="460" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

