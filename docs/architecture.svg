  <rect x="490" y="196" width="160" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="570" y="216" text-anchor="middle" dominant-baseline="central" fill="#412402">Observability</text>
  <text font-size="12" x="570" y="234" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Latency · success/fail</text>
  <line x1="490" y1="222" x2="454" y2="222" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Cost tracking -->
  <rect x="490" y="284" width="160" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="570" y="304" text-anchor="middle" dominant-baseline="central" fill="#412402">Cost tracking</text>
  <text font-size="12" x="570" y="322" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Tokens in/out · metrics</text>
  <line x1="490" y1="310" x2="454" y2="310" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Async processing -->
  <rect x="490" y="372" width="160" height="52" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="570" y="392" text-anchor="middle" dominant-baseline="central" fill="#412402">Async processing</text>
  <text font-size="12" x="570" y="410" text-anchor="middle" dominant-baseline="central" fill="#854F0B">CompletableFuture · thread pool</text>
  <line x1="490" y1="398" x2="454" y2="398" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="530" width="14" height="14" rx="3" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-size="12" x="60" y="541" fill="#5F5E5A">API flow</text>
  <rect x="140" y="530" width="14" height="14" rx="3" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="12" x="160" y="541" fill="#5F5E5A">AI + resilience</text>
  <rect x="270" y="530" width="14" height="14" rx="3" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="12" x="290" y="541" fill="#5F5E5A">Cross-cutting concerns</text>

  <!-- Title -->
  <text font-size="14" font-weight="500" x="340" y="585" text-anchor="middle" fill="#5F5E5A">AI LLM Backend Service — Architecture (Spring Boot + LangChain4j)</text>

</svg>
