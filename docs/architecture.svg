<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- CLIENT -->
  <rect x="240" y="20" width="200" height="52" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Client</text>
  <text font-size="12" x="340" y="58" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">HTTP request</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="72" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CONTROLLER -->
  <rect x="190" y="108" width="300" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="128" text-anchor="middle" dominant-baseline="central" fill="#26215C">REST controller</text>
  <text font-size="12" x="340" y="146" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Input validation · rate limiting · Swagger</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="160" x2="340" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SERVICE LAYER -->
  <rect x="190" y="196" width="300" height="52" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="216" text-anchor="middle" dominant-baseline="central" fill="#26215C">Service layer</text>
  <text font-size="12" x="340" y="234" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Summarize · classify · extract</text>

  <!-- Arrow 3 -->
  <line x1="340" y1="248" x2="340" y2="284" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

